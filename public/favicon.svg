<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Fundo Escuro do Dashboard -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131826" />
      <stop offset="100%" stop-color="#07090E" />
    </linearGradient>
    
    <!-- Sombras para dar profundidade -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Base do Ícone -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />
  <rect width="508" height="508" x="2" y="2" rx="126" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.05" />

  <!-- Pílulas Tricolores Minimalistas -->
  <g transform="translate(136, 136)" filter="url(#glow)">
    <!-- Grená -->
    <rect x="0" y="0" width="60" height="240" rx="30" fill="#900020" />
    <!-- Branco -->
    <rect x="90" y="0" width="60" height="240" rx="30" fill="#FFFFFF" />
    <!-- Verde Neon (Match com o UI) -->
    <rect x="180" y="0" width="60" height="240" rx="30" fill="#10B981" />
  </g>
</svg>
